<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Elite Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="notification" class="notification"></div>

    <div id="app">
        <!-- AUTH -->
        <div id="screen-auth" style="display: none;">
            <div class="auth-card">
                <div style="font-size: 60px; margin-bottom: 20px;">🤖</div>
                <div id="auth-login-view">
                    <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 10px;">Welcome Back</h1>
                    <p style="color: var(--text-dim); margin-bottom: 30px;">Login to your elite account.</p>
                    <input type="text" id="login-identifier" class="auth-input" placeholder="Email or Username">
                    <input type="password" id="login-password" class="auth-input" placeholder="Password">
                    <button class="auth-btn" onclick="handleLogin()">Sign In</button>
                    <p style="margin-top: 20px; color: var(--text-dim);">New here? <span style="color: var(--primary); cursor: pointer;" onclick="toggleAuth('reg')">Register</span></p>
                </div>
                <div id="auth-reg-view" style="display: none;">
                    <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 10px;">Create Account</h1>
                    <p style="color: var(--text-dim); margin-bottom: 30px;">Join the elite community.</p>
                    <input type="text" id="reg-username" class="auth-input" placeholder="Username">
                    <input type="email" id="reg-email" class="auth-input" placeholder="Email Address">
                    <input type="password" id="reg-password" class="auth-input" placeholder="Password">
                    <button class="auth-btn" onclick="handleRegister()">Register</button>
                    <p style="margin-top: 20px; color: var(--text-dim);">Already a member? <span style="color: var(--primary); cursor: pointer;" onclick="toggleAuth('login')">Login</span></p>
                </div>
            </div>
        </div>

        <!-- MAIN APP -->
        <div id="main-content" style="display: none;">
            <div class="container">
                <header class="header-info">
                    <div class="user-tag">
                        <img id="user-photo" src="https://ui-avatars.com/api/?name=U&background=8b5cf6&color=fff" alt="U">
                        <span id="user-name">User</span>
                        <i data-lucide="log-out" onclick="handleLogout()" style="width: 14px; cursor: pointer; opacity: 0.5;"></i>
                    </div>
                    <div class="balance-tag"><span id="user-balance">$0.00</span></div>
                </header>

                <div id="screen-home" class="view active">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <h1 style="font-size: 40px; font-weight: 900; margin-bottom: 10px;">AI Elite Store</h1>
                        <p style="color: var(--text-dim);">Premium access to advanced AI models.</p>
                    </div>
                    <div id="tools-list" class="tool-grid"></div>
                </div>

                <div id="screen-wallet" class="view">
                    <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 30px;">Wallet</h2>
                    <div class="tool-card" style="text-align: center;">
                        <h2 id="wallet-balance-display" style="font-size: 56px; font-weight: 900; margin-bottom: 30px;">$0.00</h2>
                        <button class="auth-btn" onclick="showView('deposit')">Add Funds</button>
                    </div>
                    <div id="transaction-list" style="margin-top: 30px;"></div>
                </div>

                <div id="screen-orders" class="view">
                    <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 30px;">My Orders</h2>
                    <div id="orders-list" class="tool-grid"></div>
                </div>

                <div id="screen-deposit" class="view">
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                        <i data-lucide="chevron-left" onclick="showView('wallet')" style="cursor: pointer;"></i>
                        <h2 style="font-size: 24px; font-weight: 900;">Add Funds</h2>
                    </div>
                    <div class="tool-card">
                        <input type="number" id="deposit-amount" class="auth-input" placeholder="Amount ($)">
                        <button class="auth-btn" onclick="initiateDeposit()">Generate Payment Link</button>
                    </div>
                </div>

                <div id="screen-admin" class="view">
                    <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 30px;">Admin</h2>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <button class="auth-btn" style="padding: 10px 20px; font-size: 12px; width: auto;" onclick="setAdminTab('inventory')">Inventory</button>
                        <button class="auth-btn" style="padding: 10px 20px; font-size: 12px; width: auto; background: var(--bg-card);" onclick="setAdminTab('users')">Users</button>
                        <button class="auth-btn" style="padding: 10px 20px; font-size: 12px; width: auto; background: var(--bg-card);" onclick="setAdminTab('logs')">Logs</button>
                    </div>
                    <div id="admin-inventory" class="admin-sub-view active">
                        <div class="tool-card">
                            <input type="text" id="admin-p-name" class="auth-input" placeholder="Name">
                            <input type="number" id="admin-p-price" class="auth-input" placeholder="Price">
                            <textarea id="admin-p-desc" class="auth-input" placeholder="Description"></textarea>
                            <input type="text" id="admin-p-img-url" class="auth-input" placeholder="Img URL">
                            <button class="auth-btn" onclick="saveProduct()">Save</button>
                        </div>
                    </div>
                    <div id="admin-users" class="admin-sub-view">
                        <div class="tool-card" id="admin-users-list"></div>
                    </div>
                    <div id="admin-logs" class="admin-sub-view">
                        <div class="tool-card" id="admin-system-logs"></div>
                    </div>
                </div>
            </div>

            <nav class="nav-bar">
                <a href="#" class="nav-item active" onclick="showView('home')"><i data-lucide="home"></i><span>Store</span></a>
                <a href="#" class="nav-item" onclick="showView('wallet')"><i data-lucide="wallet"></i><span>Wallet</span></a>
                <a href="#" class="nav-item" onclick="showView('orders')"><i data-lucide="shopping-bag"></i><span>Orders</span></a>
                <a href="#" id="nav-admin" class="nav-item" style="display: none;" onclick="showView('admin')"><i data-lucide="shield-check"></i><span>Admin</span></a>
            </nav>
        </div>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
