<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>AI Premium Store</h1>
            <p>Premium tools for powerful results</p>
        </header>

        <!-- Featured Section -->
        <section class="section">
            <div class="section-title">
                Featured Plan
                <span>View All</span>
            </div>
            <div class="glass-card" style="margin: 0 20px 24px;">
                <span class="badge">Most Popular</span>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="plan-icon">🤖</div>
                    <div>
                        <div class="plan-name" style="font-size: 18px;">ChatGPT Plus</div>
                        <div class="plan-price">$19.99 / Month</div>
                    </div>
                </div>
                <p style="color: var(--text-dim); font-size: 13px; margin-top: 12px; line-height: 1.5;">
                    Access GPT-4, DALL·E 3, and Advanced Data Analysis instantly.
                </p>
                <button class="buy-btn" style="width: 100%; margin-top: 16px; padding: 12px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer;">
                    Activate Now
                </button>
            </div>
        </section>

        <!-- Category Grid -->
        <section class="section">
            <div class="section-title">Browse Categories</div>
            <div class="plan-grid">
                <div class="plan-item" onclick="showPlans('chat')">
                    <div class="plan-icon">💬</div>
                    <div class="plan-name">Chat AI</div>
                    <div class="plan-price">From $15</div>
                </div>
                <div class="plan-item" onclick="showPlans('image')">
                    <div class="plan-icon">🎨</div>
                    <div class="plan-name">Design</div>
                    <div class="plan-price">From $10</div>
                </div>
                <div class="plan-item" onclick="showPlans('code')">
                    <div class="plan-icon">💻</div>
                    <div class="plan-name">Coding</div>
                    <div class="plan-price">From $20</div>
                </div>
                <div class="plan-item" onclick="showPlans('video')">
                    <div class="plan-icon">🎬</div>
                    <div class="plan-name">Video</div>
                    <div class="plan-price">From $25</div>
                </div>
            </div>
        </section>

        <!-- Bottom Nav -->
        <nav class="nav-bar">
            <a href="#" class="nav-item active">
                <i data-lucide="home"></i>
                Home
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="layout-grid"></i>
                Plans
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="shopping-bag"></i>
                Orders
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="user"></i>
                Account
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
